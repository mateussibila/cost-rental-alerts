name: Daily Cost Rental Scrape

on:
  schedule:
    # 07:00 UTC ≈ 08:00 Ireland (winter) / 08:00 IST (summer varies by 1h)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python run_daily.py

      - name: Export CSV
        run: python export_csv.py

      - name: Commit database and CSV updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update listings.db and listings-export.csv"
          file_pattern: listings.db listings-export.csv
