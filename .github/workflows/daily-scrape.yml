name: Daily Cost Rental Scrape

on:
  schedule:
    # 07:00 UTC ≈ 08:00 Ireland (winter) / 08:00 IST (summer varies by 1h)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Run daily scrape
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPORT_ISSUE_EMAIL: ${{ secrets.REPORT_ISSUE_EMAIL }}
        run: python -m cost_rental_alerts.run_daily

      - name: Export CSV
        run: python -m cost_rental_alerts.export_csv

      - name: Export GitHub Pages dashboard
        env:
          REPORT_ISSUE_EMAIL: ${{ secrets.REPORT_ISSUE_EMAIL }}
        run: python -m cost_rental_alerts.export_site

      - name: Check active scheme links
        continue-on-error: true
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_ISSUE_EMAIL: ${{ secrets.REPORT_ISSUE_EMAIL }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m cost_rental_alerts.check_links --warn-only

      - name: Commit database, CSV, and dashboard updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update listings data and dashboard"
          file_pattern: data/listings.db data/listings-export.csv data/listings-open.csv site/index.html

      - name: Configure GitHub Pages
        id: configure_pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact
        id: upload_pages
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy dashboard
        continue-on-error: true
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Pages deploy failure on WhatsApp
        if: ${{ always() && (steps.configure_pages.outcome == 'failure' || steps.upload_pages.outcome == 'failure' || steps.deployment.outcome == 'failure') }}
        continue-on-error: true
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CONFIGURE_OUTCOME: ${{ steps.configure_pages.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload_pages.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
        run: |
          python - <<'PY'
          import os
          import urllib.parse
          import urllib.request

          phone = os.environ.get("CALLMEBOT_PHONE", "").strip()
          apikey = os.environ.get("CALLMEBOT_APIKEY", "").strip()
          if not phone or not apikey:
              print("CallMeBot credentials missing; skipping Pages failure WhatsApp.")
              raise SystemExit(0)

          message = "\n".join(
              [
                  "⚠️ Hub Cost Rental: deploy falhou",
                  "",
                  "O alerta e os dados rodaram, mas a página pública pode estar desatualizada.",
                  f"Configure: {os.environ.get('CONFIGURE_OUTCOME')}",
                  f"Upload: {os.environ.get('UPLOAD_OUTCOME')}",
                  f"Deploy: {os.environ.get('DEPLOY_OUTCOME')}",
                  os.environ.get("RUN_URL", ""),
              ]
          )
          params = urllib.parse.urlencode(
              {
                  "phone": phone,
                  "text": message,
                  "apikey": apikey,
              }
          )
          url = f"https://api.callmebot.com/whatsapp.php?{params}"
          with urllib.request.urlopen(url, timeout=30) as response:
              response.read()
          print("Pages failure WhatsApp sent.")
          PY
